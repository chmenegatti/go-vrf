version: "2"

run:
  timeout: 5m
  go: "1.22"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gosec
    - misspell
    - unconvert
    - prealloc
  exclusions:
    rules:
      # Test files: relax some checks
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      # Generated code, vendored, etc.
      - path: vendor/
        linters: [all]

  settings:
    gosec:
      excludes:
        # G402 (TLS InsecureSkipVerify): guarded behind NSXT_SKIP_TLS_VERIFY
        # env var with a runtime warning (see #3).
        - G402
        # G304 (file inclusion via variable): file names are sanitised by
        # utils.ValidateFileName before any os.Open/Create; the CA bundle
        # path comes from operator-controlled env (NSXT_CA_BUNDLE).
        - G304
        # G704 (SSRF): request URLs are built from the operator-controlled
        # NSXT_*_BASEPATH env plus fixed API paths, not from user input.
        - G704
        # G706 (log injection): we only log integer HTTP status codes and
        # attempt counts, never user-controlled strings.
        - G706

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: ["go-vrf"]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
